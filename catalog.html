<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="catalog.css">
</head>
<body>
     <main class="catalog-page">
  <div class="container">
    <h1>Каталог товаров</h1>

    <!-- Хлебные крошки -->
    <div class="breadcrumbs">
      <a href="/">Главная</a>
      <span>→</span>
      <span>Каталог товаров</span>
    </div>

    <!-- Фильтры и сортировка -->
    <div class="catalog-controls">
      <!-- Боковая панель фильтров -->
      <aside class="filters-sidebar">
        <div class="filter-section">
          <h3>Категории</h3>
          <ul class="category-list">
            <li><a href="/catalog/notebooks" class="active">Ноутбуки</a></li>
            <li><a href="/catalog/components">Комплектующие</a></li>
            <li><a href="/catalog/monitors">Мониторы</a></li>
            <li><a href="/catalog/peripherals">Периферия</a></li>
          </ul>
        </div>

        <div class="filter-section">
          <h3>Цена, ₽</h3>
          <div class="price-range">
            <input type="number" id="min-price" placeholder="От" value="1000">
            <input type="number" id="max-price" placeholder="До" value="200000">
          </div>
        </div>

        <div class="filter-section">
          <h3>Бренд</h3>
          <div class="brand-filters">
            <label><input type="checkbox" name="brand" value="asus"> ASUS</label>
            <label><input type="checkbox" name="brand" value="msi"> MSI</label>
            <label><input type="checkbox" name="brand" value="hp"> HP</label>
          </div>
        </div>
      </aside>

      <!-- Основная область: сортировка и товары -->
      <div class="main-content">
        <div class="sorting-toolbar">
          <span>Найдено товаров: 124</span>
          <select id="sort">
            <option value="popular">По популярности</option>
            <option value="price-asc">Цена: по возрастанию</option>
            <option value="price-desc">Цена: по убыванию</option>
            <option value="new">Новинки</option>
          </select>
        </div>

        <!-- Сетка товаров -->
        <div class="products-grid" id="products-container">
          <!-- Карточки товаров -->
          <div class="product-card">
            <div class="card-image">
              <img src="placeholder.jpg" alt="Игровой ноутбук XYZ-500">
              <span class="stock-status in-stock">В наличии</span>
            </div>
            <div class="card-body">
              <h3>Игровой ноутбук XYZ-500</h3>
              <div class="rating">★★★★☆ <span>(4.7)</span></div>
              <p class="price">89 999 ₽</p>
              <button class="add-to-cart">В корзину</button>
              <button class="buy-now">Купить сейчас</button>
            </div>
          </div>
          <!-- Ещё карточки... -->
        </div>

        <!-- Пагинация -->
        <div class="pagination">
          <button class="page-btn prev">←</button>
          <button class="page-btn active">1</button>
          <button class="page-btn">2</button>
          <button class="page-btn">3</button>
          <span>...</span>
          <button class="page-btn">10</button>
          <button class="page-btn next">→</button>
        </div>
      </div>
    </div>
  </div>
</main>

</body>
</html>
